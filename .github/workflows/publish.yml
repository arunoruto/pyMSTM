name: Continuous Delivery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testing:
    uses: ./.github/workflows/test.yml

  release:
    name: Determine next version and tag it
    runs-on: ubuntu-latest
    needs:
      - testing

    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write

    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Setup | Checkout Repository on Release Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup | Force release branch to be at workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Setup | Install gfortran
        # `uv sync` also builds/installs pymstm itself (not just the
        # `build` extra's own deps), and pyproject.toml's
        # no-build-isolation-package = ["pymstm"] means that build needs
        # gfortran and meson-python already present in *this* venv --
        # same reason test.yml installs it before syncing.
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Setup | Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup | Install build dependencies
        # `dev` for meson/ninja/meson-python (needed to build pymstm
        # itself, see gfortran step above); `build` for
        # python-semantic-release.
        run: uv sync --extra build --extra dev

      - name: Evaluate | Verify upstream has NOT changed
        shell: bash
        run: |
          set +o pipefail

          UPSTREAM_BRANCH_NAME="$(git status -sb | head -n 1 | cut -d' ' -f2 | grep -E '\.{3}' | cut -d'.' -f4)"
          printf '%s\n' "Upstream branch name: $UPSTREAM_BRANCH_NAME"

          set -o pipefail

          if [ -z "$UPSTREAM_BRANCH_NAME" ]; then
              printf >&2 '%s\n' "::error::Unable to determine upstream branch name!"
              exit 1
          fi

          git fetch "${UPSTREAM_BRANCH_NAME%%/*}"

          if ! UPSTREAM_SHA="$(git rev-parse "$UPSTREAM_BRANCH_NAME")"; then
              printf >&2 '%s\n' "::error::Unable to determine upstream branch sha!"
              exit 1
          fi

          HEAD_SHA="$(git rev-parse HEAD)"

          if [ "$HEAD_SHA" != "$UPSTREAM_SHA" ]; then
              printf >&2 '%s\n' "[HEAD SHA] $HEAD_SHA != $UPSTREAM_SHA [UPSTREAM SHA]"
              printf >&2 '%s\n' "::error::Upstream has changed, aborting release..."
              exit 1
          fi

          printf '%s\n' "Verified upstream branch has not changed, continuing with release..."

      - name: Action | Semantic Version Release
        # Bumps pyproject.toml/src/pymstm/__init__.py's version, builds
        # the sdist only (build_command below) -- compiled wheels can't
        # happen here (no cross-platform toolchain in one job), that's
        # what build_wheels does afterwards against the tag this step
        # creates. Commits the bump, tags, pushes, and creates the GitHub
        # Release (with the sdist attached as an asset).
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          uv run semantic-release -v version

      - name: Publish | Upload sdist to GitHub Release Assets
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs:
      - release
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Fortran/f2py extension -- Windows needs a whole separate
        # MinGW/gfortran toolchain story we haven't set up, and Linux
        # aarch64 would mean QEMU-emulated compiles (slow, fragile for a
        # first pass) -- both left as a follow-up. macOS covers both
        # Intel (macos-13) and Apple Silicon (macos-14) natively.
        os: [ubuntu-latest, macos-13, macos-14]

    steps:
      - name: Setup | Checkout Repository at Release Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # cp39-cp313 matches pyproject.toml's requires-python >= 3.9.
          # PyPy/musllinux skipped -- Fortran extensions aren't a realistic
          # target there and it doubles build time for no real benefit.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_ARCHS_MACOS: "auto"
          CIBW_BUILD_VERBOSITY: "1"
          # manylinux images are AlmaLinux/CentOS-based -- gcc-gfortran is
          # in the base repos on both manylinux2014 and manylinux_2_28.
          CIBW_BEFORE_ALL_LINUX: "yum install -y gcc-gfortran"
          # Homebrew's gcc formula ships gfortran under a versioned name
          # (gfortran-14, gfortran-15, ...) that drifts over time -- glob
          # for whatever got installed instead of hardcoding a version.
          CIBW_BEFORE_ALL_MACOS: |
            brew install gcc
            GFORTRAN=$(find $(brew --prefix)/bin -name 'gfortran-*' | sort -V | tail -1)
            ln -sf "$GFORTRAN" $(brew --prefix)/bin/gfortran
          CIBW_ENVIRONMENT_MACOS: "FC=gfortran"
          # Smoke test: actually import and run a tiny solve inside the
          # built wheel (in an isolated venv cibuildwheel creates), not
          # just an import check -- catches a wheel that imports fine but
          # is missing/mislinked its compiled extension.
          CIBW_TEST_COMMAND: >
            python -c "
            import pymstm;
            m = pymstm.MSTM();
            m.set_spheres(radii=[1.0,1.0], positions=[[-1.5,0,0],[1.5,0,0]], orders=[6,6], ref_re=[1.5,1.5], ref_im=[0.01,0.01]);
            m.set_medium_ref(1.0, 0.0);
            m.set_incident(alpha_deg=0.0, beta_deg=0.0);
            m.set_solver_params(eps=1e-3, max_iter=200);
            m.set_verbose(False);
            m.prepare();
            r = m.solve();
            m.finalize();
            assert r['qext_tot'] > 0
            "

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI and attach wheels to the GitHub Release
    needs:
      - release
      - build_wheels
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/pymstm
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist from the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.release.outputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern '*.tar.gz' \
            --dir dist

      - name: Publish | Upload wheels to GitHub Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag }} dist/*.whl \
            --repo ${{ github.repository }} \
            --clobber

      - name: Setup | Install uv
        uses: astral-sh/setup-uv@v4

      - name: Publish | Publish to PyPI
        run: uv publish dist/*
